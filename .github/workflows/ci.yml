name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      apply_branch_protection:
        description: "Apply branch protection rules to master"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  apply-branch-protection:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.apply_branch_protection == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Apply branch protection
        env:
          GH_TOKEN: ${{ secrets.BRANCH_PROTECTION_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::BRANCH_PROTECTION_TOKEN secret is not set. This must be a PAT with administration:write scope."
            exit 1
          fi
          bash .github/scripts/apply_branch_protection.sh

  tests:
    runs-on: ubuntu-latest
    env:
      TZ: UTC
      # CI runs unit/integration tests against local/mocked flows only.
      # Keep critical config vars non-empty so import-time validation passes
      # without injecting production secrets into GitHub Actions.
      TELEGRAM_BOT_TOKEN: ci-test-bot-token
      TELEGRAM_WEBHOOK_SECRET: ci-test-webhook-secret
      TBANK_API_TOKEN: ci-test-tbank-token
      TBANK_API_BASE: https://tbank.example
      TBANK_INVOICE_STATUS_PATH: /invoice/{invoice_id}/status
      TBANK_INVOICES_LIST_PATH: /invoice/list
      CDEK_CLIENT_ID: ci-test-cdek-client-id
      CDEK_CLIENT_SECRET: ci-test-cdek-client-secret
      POSTGRES_PASSWORD: ci-test-postgres-password
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r .cursor/windmill-core-v1/requirements-ci.lock

      - name: "Iron Fence: Tier-1 Hash Lock"
        working-directory: .cursor/windmill-core-v1
        run: |
          set -o pipefail
          TIER1_MANIFEST=".tier1-hashes.sha256"
          if [ ! -f "$TIER1_MANIFEST" ]; then
            echo "::error::Tier-1 manifest not found: $TIER1_MANIFEST"
            exit 1
          fi
          FAILED=0
          while IFS='  ' read -r expected_hash expected_file; do
            [ -z "$expected_hash" ] && continue
            if [ ! -f "$expected_file" ]; then
              echo "::error::TIER-1 MISSING: $expected_file does not exist"
              FAILED=1
              continue
            fi
            actual_hash=$(tr -d '\r' < "$expected_file" | sha256sum | cut -d' ' -f1)
            if [ "$actual_hash" != "$expected_hash" ]; then
              echo "::error::TIER-1 VIOLATION: $expected_file modified (expected ${expected_hash:0:16}..., got ${actual_hash:0:16}...)"
              FAILED=1
            fi
          done < "$TIER1_MANIFEST"
          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi
          echo "Tier-1 Hash Lock: all files verified."

      - name: "Iron Fence: Boundary Grep Guards"
        working-directory: .cursor/windmill-core-v1
        run: |
          FAILED=0
          RECON_TABLES="reconciliation_audit_log|reconciliation_alerts|reconciliation_suppressions"
          TIER3_DIRS="ru_worker/ side_effects/ webhook_service/ cli/ config/"

          for dir in $TIER3_DIRS; do
            [ -d "$dir" ] || continue
            if grep -rn --include='*.py' -E "(INSERT|UPDATE|DELETE|ALTER|DROP).*(${RECON_TABLES})" "$dir"; then
              echo "::error::BOUNDARY VIOLATION: $dir contains DML against reconciliation tables"
              FAILED=1
            fi
          done

          # M3b: Core business tables — raw DML from Tier-3 forbidden (PROJECT_DNA §5)
          #
          # Whitelist tracks 8 pre-existing violations per AI-Audit
          # `_scratchpad/ai_audits/2026-04-18_pr-blocker-iron-fence-m3b.md` (Variant A amended).
          # Backlog tickets + refactor direction: docs/_governance/CORE_DML_REFACTOR_BACKLOG.md
          #
          # Policy: append-only-shrinking.
          # - New unwhitelisted violation → CI fail (enforces §5 for new code).
          # - Stale whitelist entry (line no longer matches) → CI fail (forces whitelist
          #   shrink when refactor lands; remove entry + close ticket in same PR).
          # Adding a new whitelist entry requires explicit owner governance batch.
          CORE_BIZ_TABLES="order_ledger|shipments|payment_transactions|reservations|stock_ledger_entries|availability_snapshot|documents"

          # file:line pairs excluded from M3b check. Each pair must be tracked in
          # docs/_governance/CORE_DML_REFACTOR_BACKLOG.md under a CORE-DML-NN ticket.
          M3B_WHITELIST=$(printf '%s\n' \
            'ru_worker/ru_worker.py:983' \
            'ru_worker/ru_worker.py:1016' \
            'ru_worker/ru_worker.py:1790' \
            'ru_worker/ru_worker.py:1821' \
            'ru_worker/pii_redactor.py:172' \
            'ru_worker/pii_redactor.py:196' \
            'side_effects/cdek_shipment_worker.py:231' \
            'side_effects/insales_paid_worker.py:136' \
            'side_effects/invoice_worker.py:132' \
            'side_effects/invoice_worker.py:207' \
            'side_effects/invoice_worker.py:290' \
            'side_effects/telegram_command_worker.py:531')

          ACTUAL_M3B=$(for dir in $TIER3_DIRS; do
            [ -d "$dir" ] || continue
            grep -rn --include='*.py' -E "(INSERT|UPDATE|DELETE|ALTER|DROP).*(${CORE_BIZ_TABLES})" "$dir" || true
          done | awk -F: '{print $1":"$2}' | sort -u)
          EXPECTED_M3B=$(printf '%s\n' "$M3B_WHITELIST" | sort -u)

          UNKNOWN_M3B=$(comm -23 <(printf '%s\n' "$ACTUAL_M3B") <(printf '%s\n' "$EXPECTED_M3B") | grep -v '^$' || true)
          STALE_M3B=$(comm -13 <(printf '%s\n' "$ACTUAL_M3B") <(printf '%s\n' "$EXPECTED_M3B") | grep -v '^$' || true)

          if [ -n "$UNKNOWN_M3B" ]; then
            echo "::error::M3b BOUNDARY VIOLATION: new Tier-3 DML against Core business tables (DNA §5), not in whitelist"
            echo "$UNKNOWN_M3B" | while IFS= read -r line; do echo "  new violation: $line"; done
            echo "  See docs/_governance/CORE_DML_REFACTOR_BACKLOG.md for policy."
            FAILED=1
          fi

          if [ -n "$STALE_M3B" ]; then
            echo "::error::M3b STALE WHITELIST: whitelisted line no longer matches pattern — refactor landed, remove from whitelist + close ticket in CORE_DML_REFACTOR_BACKLOG.md in the same PR"
            echo "$STALE_M3B" | while IFS= read -r line; do echo "  stale entry: $line"; done
            FAILED=1
          fi

          FORBIDDEN_IMPORTS="from domain\.reconciliation_service|from domain\.reconciliation_verify|from domain\.reconciliation_alerts|from domain\.structural_checks|from domain\.observability_service|from retention_policy|import reconciliation_service|import reconciliation_verify|import reconciliation_alerts|import structural_checks|import observability_service"
          for dir in $TIER3_DIRS; do
            [ -d "$dir" ] || continue
            if grep -rn --include='*.py' -E "$FORBIDDEN_IMPORTS" "$dir"; then
              echo "::error::BOUNDARY VIOLATION: $dir imports Tier-1 module"
              FAILED=1
            fi
          done

          TIER2_FILES="domain/payment_service.py domain/shipment_service.py domain/availability_service.py domain/document_service.py domain/fsm_guards.py domain/ports.py"
          for f in $TIER2_FILES; do
            [ -f "$f" ] || continue
            if grep -n -E "from ru_worker|from side_effects|from webhook_service|from cli |import ru_worker|import side_effects|import webhook_service" "$f"; then
              echo "::error::BOUNDARY VIOLATION: Tier-2 $f imports from Tier-3"
              FAILED=1
            fi
          done

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi
          echo "Boundary Grep Guards: passed."

      - name: "Iron Fence: Migration DDL Guard (020+)"
        working-directory: .cursor/windmill-core-v1
        run: |
          FAILED=0
          RECON_TABLES="reconciliation_audit_log|reconciliation_alerts|reconciliation_suppressions"
          for f in migrations/0[2-9]*.sql migrations/[1-9][0-9][0-9]*.sql; do
            [ -f "$f" ] || continue
            if grep -q -- '--  *CORE-CRITICAL-APPROVED:' "$f"; then
              echo "INFO: $f has CORE-CRITICAL-APPROVED escape hatch, skipping."
              continue
            fi
            if grep -iE "(ALTER|DROP|CREATE INDEX|INSERT|UPDATE|DELETE).*(${RECON_TABLES})" "$f"; then
              echo "::error::DDL GUARD: $f touches reconciliation tables without CORE-CRITICAL-APPROVED"
              FAILED=1
            fi
          done
          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi
          echo "Migration DDL Guard: passed."

      - name: "Iron Fence: Ruff (warn-only)"
        run: |
          pip install -q ruff
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "No base SHA available, skipping Ruff."
            exit 0
          fi
          CHANGED_RAW=$(git diff --name-only "$BASE_SHA" -- .cursor/windmill-core-v1) || { echo "::warning::git diff failed, skipping Ruff."; exit 0; }
          CHANGED=$(echo "$CHANGED_RAW" | grep '\.py$' || true)
          if [ -z "$CHANGED" ]; then
            echo "No changed Python files in windmill-core-v1, skipping Ruff."
            exit 0
          fi
          echo "Checking files:"
          echo "$CHANGED"
          echo "$CHANGED" | xargs -d '\n' ruff check --select E,W,F --output-format github || true
        continue-on-error: true

      - name: Run tests
        working-directory: .cursor/windmill-core-v1
        run: pytest

      - name: "Phase 3: RC-2 / RC-3 / RC-5 / RC-6 / RC-7 reconciliation tests"
        working-directory: .cursor/windmill-core-v1
        run: |
          pytest \
            tests/validation/test_phase3_rc2_shipment_cache.py \
            tests/validation/test_phase3_rc3_stock_snapshot.py \
            tests/validation/test_phase3_rc5_document_key.py \
            tests/validation/test_phase3_rc6_pending_payment.py \
            tests/validation/test_phase3_rc7_shipment_sync.py \
            -v

      - name: "Roadmap Live Status"
        run: python scripts/roadmap_status.py

      - name: "Commit Roadmap Live Status"
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ROADMAP_LIVE_STATUS.json
          if git diff --cached --quiet; then
            echo "No status changes to commit."
          else
            git commit -m "ci: update ROADMAP_LIVE_STATUS.json [skip ci]"
            git push
          fi
