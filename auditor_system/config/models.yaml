# config/models.yaml — настраиваемые модели, не менять в коде
# Роли постоянны. Модели меняются здесь.

builder:
  default: "sonnet"      # Claude Code Default (Sonnet 4.6) — подписка
  escalation: "opus"     # Claude Code Opus (Opus 4.6) — подписка
  # НЕ использовать 1M context по умолчанию (extra usage)

auditors:
  openai: "gpt-4o"              # OpenAI Responses API + Structured Outputs
  anthropic: "claude-sonnet-4-6" # Anthropic Messages API — API billing
  # Внимание: auditor (API) ≠ builder (подписка). Разные окружения.

effort:
  low: "low"
  medium: "medium"
  high: "high"
