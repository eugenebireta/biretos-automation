# auditor models remain advisory reviewers only.
# Their verdicts do NOT become owner authority and do NOT reopen Stage 8.1 runtime work.
# Quota / provider issues must be handled in a separate governance batch, not by
# reopening review_runner / approval_router / contracts during unrelated tracks.

