# config/models.yaml — настраиваемые модели, не менять в коде
# Роли постоянны. Модели меняются здесь.
# Governance note (Phase 1 corrected execution):
# auditor models remain advisory reviewers only.
# Their verdicts do NOT become owner authority and do NOT reopen Stage 8.1 runtime work.
# Quota / provider issues must be handled in a separate governance batch, not by
# reopening review_runner / approval_router / contracts during unrelated tracks.

builder:
  default: "sonnet"      # Claude Code Default (Sonnet 4.6) — подписка
  escalation: "opus"     # Claude Code Opus (Opus 4.6) — подписка
  # НЕ использовать 1M context по умолчанию (extra usage)

auditors:
  gemini: "gemini-3.1-pro-preview"        # Google Gemini API — CRITIC role
  anthropic: "claude-sonnet-4-6"           # Anthropic Messages API — JUDGE role (default: Sonnet)
  anthropic_escalation: "claude-opus-4-6"  # Escalation: Opus — only when Sonnet finds critical issues
  # openai: "gpt-4o"                      # DISABLED — quota exhausted
  # 3-tier audit cost: CLI($0) → Sonnet($0.18) → Opus($3.60, only if critical)

effort:
  low: "low"
  medium: "medium"
  high: "high"
