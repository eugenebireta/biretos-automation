# Nginx configuration snippet для T-Bank Webhook Gateway
# Добавьте в ваш основной nginx.conf в блок server {}

location /webhook/tbank {
    # Rate limiting (100 запросов в минуту с одного IP)
    limit_req zone=webhook_limit burst=10 nodelay;
    
    # Proxy к FastAPI
    proxy_pass http://127.0.0.1:8080/webhook/tbank;
    proxy_http_version 1.1;
    
    # Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Timeouts
    proxy_connect_timeout 5s;
    proxy_send_timeout 5s;
    proxy_read_timeout 5s;
    
    # Body size limit (1MB)
    client_max_body_size 1M;
}

location /health {
    proxy_pass http://127.0.0.1:8080/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}

# Rate limiting zone (добавить в http {} блок)
